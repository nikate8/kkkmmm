<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Fighter</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#050505;
  font-family:Arial;
}

canvas{
  display:block;
  margin:auto;
  background:#111;
  box-shadow:0 0 30px #00ffee;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}

.bar{
  width:200px;
  height:20px;
  background:#333;
  margin-bottom:10px;
}

.fill{
  height:100%;
  background:#00ffcc;
}

#enemyFill{
  background:#ff0044;
}

#controls{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

.ctrl{
  font-size:24px;
  margin:5px;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.attack{
  background:#ff0044;
  color:white;
  box-shadow:0 0 20px #ff0044;
}
</style>
</head>

<body>

<div id="ui">
  <div>PLAYER</div>
  <div class="bar"><div class="fill" id="playerFill"></div></div>

  <div>ENEMY</div>
  <div class="bar"><div class="fill" id="enemyFill"></div></div>
</div>

<canvas id="game" width="900" height="500"></canvas>

<div id="controls">
  <button class="ctrl" ontouchstart="keys.left=true" ontouchend="keys.left=false">⬅️</button>
  <button class="ctrl" ontouchstart="keys.right=true" ontouchend="keys.right=false">➡️</button>
  <button class="ctrl" ontouchstart="jump()">⬆️</button>
  <button class="ctrl attack" ontouchstart="attack()">⚔️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.7;

const player = {
  x:100,
  y:350,
  w:50,
  h:80,
  vx:0,
  vy:0,
  speed:5,
  hp:100,
  attacking:false,
  onGround:false
};

const enemy = {
  x:700,
  y:350,
  w:50,
  h:80,
  hp:100,
  attacking:false
};

const particles = [];

const keys = {
  left:false,
  right:false
};

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
  if(e.key==="ArrowUp") jump();
  if(e.key==="z") attack();
});

document.addEventListener("keyup", e=>{
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
});

function jump(){
  if(player.onGround){
    player.vy=-14;
    player.onGround=false;
  }
}

function attack(){
  player.attacking=true;

  setTimeout(()=>{
    player.attacking=false;
  },150);

  if(collide(player,enemy)){
    enemy.hp-=5;
    spawnParticles(enemy.x+20, enemy.y+20, "#ff0044");
  }
}

function collide(a,b){
  return(
    a.x < b.x+b.w &&
    a.x+a.w > b.x &&
    a.y < b.y+b.h &&
    a.y+a.h > b.y
  );
}

function spawnParticles(x,y,color){
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      dx:(Math.random()-0.5)*6,
      dy:(Math.random()-0.5)*6,
      life:30,
      color
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];

    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;

    ctx.fillStyle=p.color;
    ctx.shadowBlur=20;
    ctx.shadowColor=p.color;
    ctx.fillRect(p.x,p.y,4,4);

    if(p.life<=0){
      particles.splice(i,1);
    }
  }
}

function enemyAI(){
  if(enemy.hp<=0) return;

  if(enemy.x > player.x+60){
    enemy.x-=2;
  }else if(enemy.x < player.x-60){
    enemy.x+=2;
  }else{
    if(Math.random()<0.02){
      player.hp-=2;
      spawnParticles(player.x+20, player.y+20, "#00ffcc");
    }
  }
}

function update(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background glow
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // floor
  ctx.fillStyle="#222";
  ctx.fillRect(0,430,900,70);

  // movement
  player.vx=0;

  if(keys.left) player.vx=-player.speed;
  if(keys.right) player.vx=player.speed;

  player.x+=player.vx;

  // gravity
  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>=350){
    player.y=350;
    player.vy=0;
    player.onGround=true;
  }

  enemyAI();

  // player draw
  ctx.shadowBlur=25;
  ctx.shadowColor="#00ffcc";
  ctx.fillStyle=player.attacking ? "#ffffff" : "#00ffcc";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // enemy draw
  ctx.shadowBlur=25;
  ctx.shadowColor="#ff0044";
  ctx.fillStyle="#ff0044";
  ctx.fillRect(enemy.x,enemy.y,enemy.w,enemy.h);

  updateParticles();

  // hp ui
  document.getElementById("playerFill").style.width=player.hp+"%";
  document.getElementById("enemyFill").style.width=enemy.hp+"%";

  // game over
  if(player.hp<=0){
    endGame("YOU LOST");
  }

  if(enemy.hp<=0){
    endGame("YOU WIN");
  }

  requestAnimationFrame(update);
}

let ended=false;

function endGame(text){
  if(ended) return;
  ended=true;

  ctx.fillStyle="white";
  ctx.font="50px Arial";
  ctx.fillText(text,330,200);

  ctx.font="24px Arial";
  ctx.fillText("refresh to restart",340,260);
}

update();
</script>

</body>
</html>
